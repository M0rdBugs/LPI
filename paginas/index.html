<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>FelixUberShop</title>
        <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: var(--dark);
            margin: 0;
            padding: 0;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background-color: white;
            padding: 20px 40px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        nav {
            display: flex;
            align-items: center;
        }
        
        nav a {
            color: var(--dark);
            text-decoration: none;
            margin-left: 25px;
            font-weight: 500;
            transition: color 0.3s;
        }
        
        nav a:hover {
            color: var(--primary);
        }
        .logo {
            display: flex;
            align-items: center;
        }
        .logo img {
            height: 50px;
            margin-right: 10px;   
        }
        footer {
            text-align: center;
            position: fixed;
            margin: 1 auto;
            padding: 20px;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: ghostwhite;
        }
            </style>
    </head>
        <body>
            <div class="container">
            <header>
            <div class="logo">
                <a href="index.html">
                    <img src="logo.png" alt="FelixUberShop Logo">
                </a>
                <h1>FelixUberShop</h1>
            </div>
            <nav>
				<a href="#"><i class="fas fa-product-hunt"></i> Produtos</a>
				<a href="#"><i class="fas fa-contact-card"></i> Contacto</a>
				<a href="#" class="btn"><i class="fas fa-sign-in-alt"></i> Login</a>
			</nav>
        </header>

            

        <footer>
            <p>&copy; 2026 FelixUberShop. Todos os direitos reservados.</p>
        </footer>
        </body>
</html>
