<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Registo</title>
        <style>
            body {
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
                color: var(--dark);
                margin: 0;
                padding: 0;
            }
            
            .container {
                max-width: 1200px;
                margin: 0 auto;
                padding: 20px;
            }

            header {
                background-color: white;
                padding: 20px 40px;
                border-radius: 15px;
                box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
                margin-bottom: 30px;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            nav {
                display: flex;
                align-items: center;
            }
            
            nav a {
                color: var(--dark);
                text-decoration: none;
                margin-left: 25px;
                font-weight: 500;
                transition: color 0.3s;
            }
            
            nav a:hover {
                color: var(--primary);
                transform: translateY(-2px);
                transition: color 0.3s, transform 0.3s, box-shadow 0.3s;
            }
            .logo {
                display: flex;
                align-items: center;
            }
            .logo img {
                height: 50px;
                margin-right: 10px;   
            }
            .logo:hover {
                transform: translateY(-2px);
                transition: transform 0.3s, box-shadow 0.3s;
            }
            footer {
                text-align: center;
                position: fixed;
                margin: 1 auto;
                padding: 20px;
                bottom: 0;
                left: 0;
                width: 100%;
                background-color: ghostwhite;
            }
            form {
                background-color: white;
                padding: 30px;
                border-radius: 15px;
                box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
                max-width: fit-content;
                margin: 0 auto;
            }

            form h2 {
                margin-bottom: 20px;
                text-align: center;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <header>
                <div class="logo">
                    <a href="index.html">
                        <img src="logo.png" alt="FelixUberShop Logo">
                    </a>
                    <h1>Registo</h1>
                </div>
                <nav>
                    <a href="produtos.html"><i class="fas fa-product-hunt"></i> Produtos</a>
                    <a href="contactos.html"><i class="fas fa-contact-card"></i> Contacto</a>
                    <a href="login.html" class="btn"><i class="fas fa-sign-in-alt"></i> Login | Registo</a>
                </nav>
            </header>
        </div>
        <div class ="form-container">
            <form action="registo.php" method="POST">
                <h2>Faça Registo</h2>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <label for="nome">Nome de Utilizador:</label>
                <input type="text" id="nome" name="nome" required>

                <label for="password">Senha:</label>
                <input type="password" id="password" name="password" required>
      
                <button type="submit">Registrar</button>
                
            </form>
            
        </div>
        <footer>
            <p>&copy; 2026 FelixUberShop. Todos os direitos reservados.</p>
        </footer>
    </body>
</html>
