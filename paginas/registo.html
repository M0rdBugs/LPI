<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="styles.css">
        <title>Registo</title>
        <style>
            form {
                background-color: white;
                padding: 30px;
                border-radius: 15px;
                box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
                max-width: fit-content;
                margin: 0 auto;
                height: 100px;
            }
            form h1 {
                margin-bottom:auto;
            }
            form h2 {
                margin-bottom: 20px;
                text-align: center;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <header>
                <div class="logo">
                    <a href="index.html">
                        <img src="logo.png" alt="FelixUberShop Logo">
                    </a>
                    <h1>Registo</h1>
                </div>
                <nav>
                    <a href="produtos.jsp"><i class="fas fa-product-hunt"></i> Produtos</a>
                    <a href="contactos.html"><i class="fas fa-contact-card"></i> Contacto</a>
                    <a href="login.html" class="btn"><i class="fas fa-sign-in-alt"></i> Login | Registo</a>
                </nav>
            </header>
        </div>
        <div class ="form-container">
            <form action="registo.jsp" method="POST">
                <h2>Faça Registo</h2>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <label for="nome">Nome de Utilizador:</label>
                <input type="text" id="nome" name="nome" required>

                <label for="password">Senha:</label>
                <input type="password" id="password" name="password" required>
      
                <button type="submit">Registrar</button>
                
            </form>
            
        </div>
        <footer>
            <p>&copy; 2026 FelixUberShop. Todos os direitos reservados.</p>
        </footer>
    </body>
</html>
